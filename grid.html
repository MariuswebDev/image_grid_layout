<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>Image Grid Layout</title>
    <link rel="stylesheet" href="grid.css">
</head>

<body>
    <div class="gallery">
        <div class="item tall">
            <img src="images/image1.avif" alt="image_1">
        </div>
        <div class="item short">
            <img src="images/image2.webp" alt="image_2">
        </div>
        <div class="item tall">
            <img src="images/image3.jpeg" alt="image_3">
        </div>
        <div class="item tall">
            <img src="images/image4.avif" alt="image_4">
        </div>
        <div class="item short">
            <img src="images/image5.jpg" alt="image_5">
        </div>
        <div class="item short">
            <img src="images/image6.jpg" alt="image_6">
        </div>
    </div>
</body>

</html>
